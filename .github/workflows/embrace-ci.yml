name: embrace-mobile-rum

# Builds + uploads symbol artefacts on every push to the
# `obs-experiment-embrace` branch and on PRs targeting it.
# Two parallel jobs: `android` (ubuntu-latest, free) and `ios`
# (macos-latest, ~10x billable per minute — kept short).
#
# Secrets required (configure once in repo Settings > Secrets):
#   EMBRACE_APP_ID         (12-char hex from dash.embrace.io)
#   EMBRACE_API_TOKEN      (32-char hex)

on:
  push:
    branches: [obs-experiment-embrace]
    paths:
      - 'dracu_app/**'
      - '.github/workflows/embrace-ci.yml'
  pull_request:
    branches: [obs-experiment-embrace]
    paths:
      - 'dracu_app/**'
      - '.github/workflows/embrace-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: dracu_app

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.27
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable

      - name: Materialise embrace-config.json from secrets
        # The repo only commits embrace-config.json.example; CI
        # writes the real file at build time so the credentials
        # never enter the git history.
        env:
          EMBRACE_APP_ID: ${{ secrets.EMBRACE_APP_ID }}
          EMBRACE_API_TOKEN: ${{ secrets.EMBRACE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${EMBRACE_APP_ID:-}" || -z "${EMBRACE_API_TOKEN:-}" ]]; then
            echo "::warning::EMBRACE_APP_ID/EMBRACE_API_TOKEN secrets not set; building without them. Crashes will be unsymbolicated and no session payloads will land in the dashboard."
            cp android/app/src/main/embrace-config.json.example android/app/src/main/embrace-config.json
          else
            cat > android/app/src/main/embrace-config.json <<EOF
          {
            "app_id": "${EMBRACE_APP_ID}",
            "api_token": "${EMBRACE_API_TOKEN}",
            "ndk_enabled": true,
            "sdk_config": { "app_framework": "flutter" }
          }
          EOF
          fi

      - name: flutter pub get
        run: flutter pub get

      - name: Build release APK + Swazzler-driven mapping upload
        # The Swazzler hooks into `assembleRelease` and uploads
        # mapping.txt + the Dart split-debug-info to Embrace's
        # symbol API. Look for the `[Embrace] Uploaded mapping for`
        # line in this step's logs.
        run: make build-android-release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: dracu_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload Dart split-debug-info
        uses: actions/upload-artifact@v4
        with:
          name: dart-symbols
          path: dracu_app/build/symbols
          retention-days: 30

  ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter 3.27
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable

      - name: Materialise Embrace-Info.plist from secrets
        env:
          EMBRACE_APP_ID: ${{ secrets.EMBRACE_APP_ID }}
          EMBRACE_API_TOKEN: ${{ secrets.EMBRACE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${EMBRACE_APP_ID:-}" || -z "${EMBRACE_API_TOKEN:-}" ]]; then
            echo "::warning::EMBRACE_APP_ID/EMBRACE_API_TOKEN secrets not set; iOS build will skip dSYM upload."
            cp ios/Runner/Embrace-Info.plist.example ios/Runner/Embrace-Info.plist
          else
            /usr/libexec/PlistBuddy -c "Set :EMBRACE_APP_ID ${EMBRACE_APP_ID}" \
                -c "Set :EMBRACE_API_TOKEN ${EMBRACE_API_TOKEN}" \
                ios/Runner/Embrace-Info.plist.example
            cp ios/Runner/Embrace-Info.plist.example ios/Runner/Embrace-Info.plist
          fi

      - name: flutter pub get
        run: flutter pub get

      - name: pod install
        working-directory: dracu_app/ios
        run: pod install --repo-update

      - name: Build iOS release (no codesign)
        # `--no-codesign` because we don't ship a provisioning
        # profile in CI. The dSYM is still produced and uploaded
        # — that's all this job's job.
        run: flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/symbols

      - name: Upload dSYM
        env:
          EMBRACE_APP_ID: ${{ secrets.EMBRACE_APP_ID }}
          EMBRACE_API_TOKEN: ${{ secrets.EMBRACE_API_TOKEN }}
        run: |
          if [[ -z "${EMBRACE_APP_ID:-}" || -z "${EMBRACE_API_TOKEN:-}" ]]; then
            echo "Skipping dSYM upload — no creds."
            exit 0
          fi
          APP_ID="${EMBRACE_APP_ID}" API_TOKEN="${EMBRACE_API_TOKEN}" \
              bash observability/symbolication/upload-ios-dsym.sh

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-build
          path: dracu_app/build/ios/iphoneos/
          retention-days: 14
